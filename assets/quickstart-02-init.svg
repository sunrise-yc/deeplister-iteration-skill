<svg xmlns="http://www.w3.org/2000/svg" width="980" height="420" viewBox="0 0 980 420" role="img" aria-labelledby="title desc">
  <title id="title">Vibe Lens 初始化快闪照</title>
  <desc id="desc">展示使用 --init 自动创建 docs/iteration-record.md。</desc>
  <rect width="980" height="420" rx="18" fill="#eef2f7"/>
  <rect x="40" y="42" width="900" height="336" rx="14" fill="#fff" stroke="#dbe3ee"/>
  <text x="76" y="92" font-family="Microsoft YaHei, Segoe UI, sans-serif" font-size="30" font-weight="800" fill="#111827">2. 初始化记录文件</text>
  <text x="76" y="128" font-family="Microsoft YaHei, Segoe UI, sans-serif" font-size="18" fill="#64748b">第一次使用不要手动建文件，直接让脚本生成标准记录。</text>
  <rect x="76" y="164" width="828" height="150" rx="10" fill="#111827"/>
  <circle cx="102" cy="190" r="6" fill="#ef4444"/>
  <circle cx="124" cy="190" r="6" fill="#f59e0b"/>
  <circle cx="146" cy="190" r="6" fill="#22c55e"/>
  <text x="100" y="236" font-family="Consolas, monospace" font-size="18" fill="#e5e7eb">python "$env:USERPROFILE\.codex\skills\dl-vibe-lens-skill\scripts\lens_snapshot.py" \</text>
  <text x="128" y="270" font-family="Consolas, monospace" font-size="18" fill="#93c5fd">--project-root . --init</text>
  <rect x="76" y="330" width="320" height="34" rx="17" fill="#eff6ff" stroke="#bfdbfe"/>
  <text x="96" y="353" font-family="Microsoft YaHei, Segoe UI, sans-serif" font-size="15" fill="#1d4ed8">生成 docs/iteration-record.md</text>
</svg>
