name: Feature request / 功能建议
description: Suggest an improvement or new capability.
title: "[Feature]: "
labels: ["enhancement", "needs-triage"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem would this solve?
      description: Describe the user pain before describing the feature.
      placeholder: "When I use this skill in my own vibe-coding project, I need..."
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like the skill or script to do?
    validations:
      required: true
  - type: dropdown
    id: product_area
    attributes:
      label: Product area
      description: Which part of Vibe Lens would this improve?
      options:
        - First-run setup
        - Source record parsing
        - Git diff statistics
        - HTML review report
        - Evidence or verification trail
        - Conflict signals
        - Future interactive platform
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any workaround or simpler version that might be enough?
  - type: textarea
    id: context
    attributes:
      label: Extra context
      description: Links, examples, screenshots, or related projects.
